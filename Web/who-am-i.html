<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html">Leo's Site</a>
      <nav class="nav-links">
        <a href="who-am-i.html">About</a>
        <a href="my-experience.html">Experience</a>

        <a href="Resume Houyi LIU.pdf" target="_blank" rel="noopener" class="nav-btn">Resume</a>
      </nav>
    </div>
  </header>

  <main class="container page-main">
    <section class="about-grid">
      <div>
        <h1 id="about-title" class="page-title">About</h1>
        <p id="about-subtitle" class="page-subtitle"></p>
        <div id="about-body" class="page-body"></div>
      </div>
      <div class="about-image">
        <img src="https://www.figma.com/api/mcp/asset/185a3fae-fe44-4324-8346-e8ee47ecf7ea" alt="About photo">
      </div>
    </section>

    <section class="contact-block" id="contact-me">
      <h3>Contact me</h3>
      <form class="contact-grid" action="mailto:houyi.leo@example.com" method="post" enctype="text/plain">
        <div class="input-wrap">
          <label for="first-name">First name</label>
          <input id="first-name" name="firstName" type="text" placeholder="Jane">
        </div>
        <div class="input-wrap">
          <label for="last-name">Last name</label>
          <input id="last-name" name="lastName" type="text" placeholder="Smitherton">
        </div>
        <div class="input-wrap input-full">
          <label for="email">Email address</label>
          <input id="email" name="email" type="email" placeholder="email@example.com">
        </div>
        <div class="input-wrap input-full">
          <label for="message">Your message</label>
          <textarea id="message" name="message" placeholder="Enter your question or message"></textarea>
        </div>
        <button class="submit-btn" type="submit">Submit</button>
      </form>
    </section>
  </main>

  <footer class="footer section">
    <div class="container">
      <div class="top-line"></div>
      <div class="footer-main">
        <div>
          <div class="brand" style="color:#222;">Leo's Site</div>
          <div class="socials">
            <a class="social" href="https://www.linkedin.com/in/houyi-liu-leo" target="_blank" rel="noopener">in</a>
            <a class="social" href="perspectives.html">P</a>
            <a class="social" href="mailto:houyi.leo@example.com">@</a>
            <a class="social" href="Resume Houyi LIU.pdf" target="_blank" rel="noopener">CV</a>

        </div>
        <div>
          <h4>Pages</h4>
          <ul>
            <li><a href="index.html">Home</a></li>

        </div>
        <div>
          <h4>Writing</h4>
          <ul>
            <li><a href="perspectives.html">Perspectives</a></li>
            <li><a href="notes/index.html">Notes</a></li>
          </ul>
        </div>
        <div>
          <h4>Contact</h4>
          <ul>
            <li><a href="mailto:houyi.leo@example.com">Email</a></li>
            <li><a href="Resume Houyi LIU.pdf" target="_blank" rel="noopener">Resume</a></li>
          </ul>
        </div>
      </div>
    </div>
  </footer>

  <script>
    async function loadAbout() {
      const titleEl = document.getElementById('about-title');
      const subtitleEl = document.getElementById('about-subtitle');
      const bodyEl = document.getElementById('about-body');

      try {
        const response = await fetch('who-am-i.json');
        const data = await response.json();

        titleEl.textContent = data.title || 'About';
        subtitleEl.textContent = data.introduction || '';

        bodyEl.innerHTML = (data.sections || []).map((section) => `
          <h3 style="font-size:24px; margin: 0 0 8px;">${section.title}</h3>
          <p style="margin: 0 0 24px;">${section.content}</p>
        `).join('');
      } catch (error) {
        subtitleEl.textContent = 'Unable to load profile content right now.';
      }
    }

    loadAbout();
  </script>
</body>
</html>
