  <script>
    function humanizeFileName(filePath) {
      const name = (filePath || '')
        .split('/')
        .pop()
        .replace(/\.[^/.]+$/, '')
        .replace(/[-_]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      if (!name) {
        return 'Untitled Photo';
      }

      return name.replace(/\b\w/g, function capitalize(letter) {
        return letter.toUpperCase();
      });
    }

    function createGalleryCard(item) {
      const title = item.title && item.title.trim() ? item.title.trim() : humanizeFileName(item.src);
      const caption = item.caption && item.caption.trim() ? item.caption.trim() : 'A captured moment from my personal gallery.';
      const alt = item.alt && item.alt.trim() ? item.alt.trim() : title;

      const article = document.createElement('article');
      article.className = 'gallery-card';

      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'gallery-card-inner';
      button.setAttribute('aria-pressed', 'false');
      button.setAttribute('aria-label', 'Flip photo card');

      const front = document.createElement('span');
      front.className = 'gallery-face gallery-face-front';

      const img = document.createElement('img');
      img.src = item.src;
      img.alt = alt;
      img.loading = 'lazy';
      img.decoding = 'async';
      front.appendChild(img);

      const back = document.createElement('span');
      back.className = 'gallery-face gallery-face-back';

      const heading = document.createElement('h2');
      heading.textContent = title;

      const paragraph = document.createElement('p');
      paragraph.textContent = caption;

      back.appendChild(heading);
      back.appendChild(paragraph);

      button.appendChild(front);
      button.appendChild(back);
      article.appendChild(button);

      function toggleFlip() {
        const isFlipped = button.classList.toggle('is-flipped');
        button.setAttribute('aria-pressed', isFlipped ? 'true' : 'false');
      }

      button.addEventListener('click', toggleFlip);

      return article;
    }

    async function loadExperience() {
      const gallery = document.getElementById('photo-gallery');

      try {
        const response = await fetch('my-experience.json');
        const items = await response.json();
        const photos = Array.isArray(items) ? items.filter(function filterEnabled(item) {
          return item && item.src && item.enabled !== false;
        }) : [];

        if (photos.length === 0) {
          gallery.innerHTML = '<p class="gallery-message">No photos available.</p>';
          return;
        }

        const fragment = document.createDocumentFragment();
        photos.forEach(function renderCard(photo) {
          fragment.appendChild(createGalleryCard(photo));
        });
        gallery.appendChild(fragment);
      } catch (error) {
        gallery.innerHTML = '<p class="gallery-message">Unable to load photos.</p>';
      }
    }

    loadExperience();
  </script>
