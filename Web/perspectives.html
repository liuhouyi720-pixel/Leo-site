  <script>
    const fallbackImage = 'perspectives/images/silicon-valley-fire-1.jpg';

    function formatDate(value) {
      return new Date(value).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    async function loadPerspectives() {
      const featured = document.getElementById('featured');
      const grid = document.getElementById('article-grid');

      try {
        const response = await fetch('perspectives/articles.json');
        const articles = await response.json();
        const sorted = [...articles].sort((a, b) => new Date(b.date) - new Date(a.date));

        if (sorted.length === 0) {
          featured.innerHTML = '<p>No articles available.</p>';
          return;
        }

        const [latest, ...others] = sorted;

        featured.innerHTML = `
          <a href="article.html?id=${latest.id}">
            <img src="${latest.imageUrl}" alt="${latest.title}" onerror="this.src='${fallbackImage}'">
          </a>
          <div>
            <p class="meta">${formatDate(latest.date)}</p>
            <h1><a href="article.html?id=${latest.id}">${latest.title}</a></h1>
            <p class="page-subtitle" style="margin-top:18px;">${latest.summary}</p>
          </div>
        `;

        grid.innerHTML = others.map((article) => `
          <article class="card">
            <a href="article.html?id=${article.id}">
              <img src="${article.imageUrl}" alt="${article.title}" onerror="this.src='${fallbackImage}'" style="aspect-ratio:404/346;">
            </a>
            <div>
              <h3><a href="article.html?id=${article.id}">${article.title}</a></h3>
              <p>${formatDate(article.date)}</p>
              <p>${article.summary}</p>
            </div>
          </article>
        `).join('');
      } catch (error) {
        featured.innerHTML = '<p>Unable to load featured article.</p>';
        grid.innerHTML = '<p>Unable to load article list.</p>';
      }
    }

    loadPerspectives();
  </script>
