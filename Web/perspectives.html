
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Perspectives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="notes/notes.css">
    <style>
        body {
            background-color: #1a202c; /* Slate background */
            color: #e2e8f0; /* Light text */
        }
    </style>
</head>
<body>
    <header>
        <h1>My Perspectives</h1>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Sorting Controls -->
        <div class="flex justify-end items-center mb-8">
            <label for="sort-by" class="text-gray-400 mr-2">Sort by:</label>
            <select id="sort-by" class="bg-gray-700 text-white rounded-md p-2">
                <option value="date">Latest</option>
                <option value="clicks">Popularity</option>
            </select>
        </div>

        <!-- Articles Container -->
        <div id="perspectives-container" class="space-y-8"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const container = document.getElementById('perspectives-container');
            const sortBySelect = document.getElementById('sort-by');
            let articles = [];

            // Function to get click counts from localStorage
            function getClickCounts() {
                const clicks = localStorage.getItem('article_clicks');
                return clicks ? JSON.parse(clicks) : {};
            }

            // Function to save click counts to localStorage
            function saveClickCounts(clicks) {
                localStorage.setItem('article_clicks', JSON.stringify(clicks));
            }

            // Function to render articles
            function renderArticles(sortedArticles) {
                const clickCounts = getClickCounts();
                container.innerHTML = sortedArticles.map((item) => `
                    <article class="bg-gray-700 p-6 rounded-lg shadow-md flex flex-col md:flex-row gap-4 md:items-center" data-id="${item.id}">
                        <a href="article.html?id=${item.id}" class="flex-shrink-0 article-link">
                            <img src="${item.imageUrl}" alt="${item.title}" class="w-full md:w-56 h-36 object-cover rounded-md" />
                        </a>
                        <div>
                            <p class="text-sm text-gray-400">${item.date} &bull; ${clickCounts[item.id] || 0} views</p>
                            <h3 class="text-2xl font-bold text-cyan-400 mt-1"><a href="article.html?id=${item.id}" class="article-link">${item.title}</a></h3>
                            <p class="text-gray-300 mt-2">${item.summary}</p>
                        </div>
                    </article>
                `).join('');
            }

            // Function to sort and render articles
            function sortAndRender() {
                const sortBy = sortBySelect.value;
                const clickCounts = getClickCounts();
                let sortedArticles = [...articles];

                if (sortBy === 'date') {
                    sortedArticles.sort((a, b) => new Date(b.date) - new Date(a.date));
                } else if (sortBy === 'clicks') {
                    sortedArticles.sort((a, b) => (clickCounts[b.id] || 0) - (clickCounts[a.id] || 0));
                }

                renderArticles(sortedArticles);
            }

            // --- Initial Load ---
            try {
                const response = await fetch('perspectives/articles.json');
                articles = await response.json();
                sortAndRender(); // Initial render based on default sort (date)
            } catch (error) {
                console.error("Failed to load perspectives:", error);
                container.innerHTML = '<p class="text-center text-red-500">Failed to load articles. Please check the console for details.</p>';
            }

            // Event listener for sorting
            sortBySelect.addEventListener('change', sortAndRender);

            // Event listener for click tracking
            container.addEventListener('click', function(e) {
                const link = e.target.closest('.article-link');
                if (link) {
                    const articleElement = link.closest('article');
                    const articleId = articleElement.dataset.id;
                    if (articleId) {
                        const clickCounts = getClickCounts();
                        clickCounts[articleId] = (clickCounts[articleId] || 0) + 1;
                        saveClickCounts(clickCounts);
                    }
                }
            });
        });
    </script>
</body>
</html>
