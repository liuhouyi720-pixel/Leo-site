
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观点 | Perspectives</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-800">

    <div id="nav-container"></div>

    <main class="container mx-auto mt-8 p-4">
        <section id="featured-article" class="mb-12"></section>
        
        <h2 class="text-3xl font-bold border-b-2 border-gray-300 pb-2 mb-6">Past Articles</h2>
        <section id="article-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Navigation
            try {
                const navResponse = await fetch('nav.html');
                const navHtml = await navResponse.text();
                document.getElementById('nav-container').innerHTML = navHtml;
            } catch (error) {
                console.error('Failed to load navigation:', error);
            }

            // Load Articles
            try {
                const response = await fetch('perspectives/articles.json');
                const articles = await response.json();
                
                // Sort articles by date to find the latest
                articles.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                const [latestArticle, ...otherArticles] = articles;

                // Render Featured Article
                const featuredContainer = document.getElementById('featured-article');
                if (latestArticle) {
                    featuredContainer.innerHTML = `
                        <a href="article.html?id=${latestArticle.id}" class="block group">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                                <img src="${latestArticle.imageUrl}" alt="${latestArticle.title}" class="w-full h-auto object-cover rounded-lg shadow-lg">
                                <div>
                                    <p class="text-sm text-gray-500 mb-2">${new Date(latestArticle.date).toLocaleDateString()}</p>
                                    <h1 class="text-4xl font-bold text-gray-900 group-hover:text-blue-600 transition-colors">${latestArticle.title}</h1>
                                    <p class="text-gray-600 mt-4">${latestArticle.summary}</p>
                                </div>
                            </div>
                        </a>
                    `;
                }

                // Render Article Grid
                const gridContainer = document.getElementById('article-grid');
                if (otherArticles.length > 0) {
                    gridContainer.innerHTML = otherArticles.map(article => `
                        <a href="article.html?id=${article.id}" class="block group bg-white p-6 rounded-lg shadow-md hover:shadow-xl transition-shadow">
                            <img src="${article.imageUrl}" alt="${article.title}" class="w-full h-48 object-cover rounded-md mb-4">
                            <p class="text-xs text-gray-500 mb-1">${new Date(article.date).toLocaleDateString()}</p>
                            <h3 class="text-xl font-semibold text-gray-800 group-hover:text-blue-600 transition-colors">${article.title}</h3>
                            <p class="text-sm text-gray-600 mt-2">${article.summary}</p>
                        </a>
                    `).join('');
                } else {
                    gridContainer.innerHTML = '<p>No other articles found.</p>';
                }

            } catch (error) {
                console.error("Failed to load articles:", error);
                document.getElementById('article-grid').innerHTML = '<p class="text-red-500">Error loading articles.</p>';
            }
        });
    </script>

</body>
</html>
