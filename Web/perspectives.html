  <script>
    const fallbackImage = 'perspectives/images/silicon-valley-fire-1.jpg';
    const INITIAL_VISIBLE = 4;
    const LOAD_MORE_STEP = 8;

    let visibleCount = INITIAL_VISIBLE;
    let sortedArticles = [];

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatDate(value) {
      return new Date(value).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      }).toUpperCase();
    }

    function renderCards() {
      const grid = document.getElementById('perspectives-grid');
      const viewMoreButton = document.getElementById('view-more-btn');

      if (sortedArticles.length === 0) {
        grid.innerHTML = '<p class="perspectives-empty">No articles available.</p>';
        viewMoreButton.hidden = true;
        return;
      }

      const visibleArticles = sortedArticles.slice(0, visibleCount);

      grid.innerHTML = visibleArticles.map((article) => `
        <article class="perspective-card">
          <a class="perspective-link" href="article.html?id=${encodeURIComponent(article.id)}" aria-label="${escapeHtml(article.title)}">
            <img src="${escapeHtml(article.imageUrl)}" alt="${escapeHtml(article.title)}" onerror="this.src='${fallbackImage}'">
            <span class="perspective-tag">ARTICLE</span>
            <div class="perspective-panel">
              <p class="perspective-meta">
                <span>ARTICLE</span>
                <span>${formatDate(article.date)}</span>
              </p>
              <h2>${escapeHtml(article.title)}</h2>
              <p class="perspective-summary">${escapeHtml(article.summary)}</p>
              <span class="perspective-cta" aria-hidden="true">LEARN MORE →</span>
            </div>
          </a>
        </article>
      `).join('');

      const hasMore = visibleCount < sortedArticles.length;
      viewMoreButton.hidden = !hasMore;
      viewMoreButton.disabled = !hasMore;
    }

    function bindViewMore() {
      const viewMoreButton = document.getElementById('view-more-btn');
      viewMoreButton.addEventListener('click', () => {
        visibleCount += LOAD_MORE_STEP;
        renderCards();
      });
    }

    async function loadPerspectives() {
      const grid = document.getElementById('perspectives-grid');
      const viewMoreButton = document.getElementById('view-more-btn');

      try {
        const response = await fetch('perspectives/articles.json?v=20260512a', { cache: 'no-store' });
        const articles = await response.json();
        sortedArticles = [...articles].sort((a, b) => new Date(b.date) - new Date(a.date));
        visibleCount = INITIAL_VISIBLE;
        renderCards();
      } catch (error) {
        grid.innerHTML = '<p class="perspectives-empty">Unable to load article list.</p>';
        viewMoreButton.hidden = true;
      }
    }

    bindViewMore();
    loadPerspectives();
  </script>
