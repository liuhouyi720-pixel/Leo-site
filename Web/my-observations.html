  <script>
    const fallbackImage = 'https://www.figma.com/api/mcp/asset/e03f7b36-c14e-405a-a093-94a32f495e3a';

    async function loadObservations() {
      const grid = document.getElementById('observation-grid');
      try {
        const response = await fetch('my-observations.json');
        const data = await response.json();

        grid.innerHTML = data.map((item) => `
          <article class="obs-card">
            <img src="${item.imageUrl}" alt="${item.title}" onerror="this.src='${fallbackImage}'">
            <h3>${item.title}</h3>
            <p>${item.summary}</p>
          </article>
        `).join('');
      } catch (error) {
        grid.innerHTML = '<p>Unable to load observation content.</p>';
      }
    }

    loadObservations();
  </script>
