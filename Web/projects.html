  <script>
    const fallbackImage = 'perspectives/images/silicon-valley-fire-2.jpg';

    async function loadProjects() {
      const grid = document.getElementById('project-grid');
      try {
        const response = await fetch('projects.json');
        const data = await response.json();

        grid.innerHTML = data.map((item) => `
          <article class="obs-card">
            <img src="${item.imageUrl}" alt="${item.title}" onerror="this.src='${fallbackImage}'">
            <h3>${item.title}</h3>
            <p>${item.summary}</p>
          </article>
        `).join('');
      } catch (error) {
        grid.innerHTML = '<p>Unable to load project content.</p>';
      }
    }

    loadProjects();
  </script>
