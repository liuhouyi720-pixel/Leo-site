
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article</title> <!-- Title will be updated dynamically -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">

    <div id="nav-container"></div>

    <main class="container mx-auto mt-24 p-4">
        <article id="article-container" class="max-w-4xl mx-auto bg-white p-8 md:p-12 rounded-lg shadow-lg prose lg:prose-xl">
            <!-- Article content will be injected here -->
            <h1 id="article-title" class="mb-8"></h1>
            <div id="article-content"></div>
        </article>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Navigation
            try {
                const navResponse = await fetch('nav.html');
                const navHtml = await navResponse.text();
                document.getElementById('nav-container').innerHTML = navHtml;
            } catch (error) {
                console.error('Failed to load navigation:', error);
            }

            // Load Article Content
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');
            const articleTitleEl = document.getElementById('article-title');
            const articleContentEl = document.getElementById('article-content');

            if (!articleId) {
                articleTitleEl.textContent = 'Error';
                articleContentEl.innerHTML = '<p>Article not found. Please provide an article ID.</p>';
                return;
            }

            try {
                // 1. Fetch metadata from articles.json
                const metaResponse = await fetch('perspectives/articles.json');
                const articles = await metaResponse.json();
                const articleMeta = articles.find(a => a.id === articleId);

                if (!articleMeta) {
                    articleTitleEl.textContent = 'Not Found';
                    articleContentEl.innerHTML = `<p>Could not find an article with ID: ${articleId}</p>`;
                    return;
                }

                // Update page and H1 title
                document.title = articleMeta.title;
                articleTitleEl.textContent = articleMeta.title;

                // 2. Fetch the actual Markdown file content
                const markdownResponse = await fetch(articleMeta.markdownFile);
                const markdownWithFrontMatter = await markdownResponse.text();

                // 3. Strip the Front Matter from the markdown content
                // This regex specifically targets the front matter at the beginning of the file.
                const markdownBody = markdownWithFrontMatter.replace(/^---[\s\S]+?---/, '').trim();

                // 4. Convert Markdown to HTML using Showdown
                const converter = new showdown.Converter({
                    tables: true, // Enable table support
                    strikethrough: true, // Enable strikethrough support
                    tasklists: true // Enable task list support
                });
                const htmlContent = converter.makeHtml(markdownBody);

                // 5. Inject the HTML into the page
                articleContentEl.innerHTML = htmlContent;

            } catch (error) {
                console.error('Failed to load article:', error);
                articleTitleEl.textContent = 'Error';
                articleContentEl.innerHTML = '<p>There was an error loading the article. Please check the console for more details.</p>';
            }
        });
    </script>

</body>
</html>
